name: Build and Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (example: v0.2.0)"
        required: true
        type: string
      prerelease:
        description: "Publish as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --locked

  build:
    name: Build ${{ matrix.asset_name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: windows-x64
            archive_ext: zip
            binary_name: multus.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: linux-x64
            archive_ext: tar.gz
            binary_name: multus
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: macos-x64
            archive_ext: tar.gz
            binary_name: multus
          - os: macos-15
            target: aarch64-apple-darwin
            asset_name: macos-arm64
            archive_ext: tar.gz
            binary_name: multus

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactName = "multus-${{ matrix.asset_name }}.${{ matrix.archive_ext }}"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary_name }}" "dist\${{ matrix.binary_name }}" -Force
          Compress-Archive -Path "dist\${{ matrix.binary_name }}" -DestinationPath $artifactName -Force

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          artifact_name="multus-${{ matrix.asset_name }}.${{ matrix.archive_ext }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          chmod +x "dist/${{ matrix.binary_name }}"
          tar -C dist -czf "${artifact_name}" "${{ matrix.binary_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_name }}
          path: multus-${{ matrix.asset_name }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      IS_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: ${{ env.IS_PRERELEASE }}
          files: release-assets/*
          fail_on_unmatched_files: true
